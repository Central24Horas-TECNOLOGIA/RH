<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Teste Central 24 horas</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="style/styles.css" rel="stylesheet"/>
</head>
<body data-screen="screen-config">
<section class="active screen" id="screen-config">
<div class="rh-modern-shell rh-modern-shell-history">
<aside class="rh-modern-sidebar">
<div class="rh-modern-sidebar-brand">
<button aria-label="Voltar para a página principal" class="rh-modern-logo-btn" onclick="backToMenu()" type="button">
<img alt="Logo Central 24 Horas" class="rh-modern-logo" src="style/logo-central24-crop.jpg"/>
</button>
<div>
<div class="rh-modern-brand-title">Conexa</div>
<div class="rh-modern-brand-subtitle">Configuração da prova</div>
</div>
</div>
<nav class="rh-modern-nav">
<button class="rh-modern-nav-btn" data-nav-screen="screen-menu" onclick="backToMenu()" type="button">
<span class="material-symbols-outlined">home</span>
<span>Página Inicial</span>
</button>
<button class="rh-modern-nav-btn" data-nav-screen="screen-history" onclick="goToHistory()" type="button">
<span class="material-symbols-outlined">history</span>
<span>Histórico</span>
</button>
<button class="rh-modern-nav-btn" data-nav-screen="screen-processes" onclick="goToProcesses()" type="button">
<span class="material-symbols-outlined">folder_managed</span>
<span>Gerenciar processos</span>
</button>
<button class="rh-modern-nav-btn" data-nav-screen="screen-talent-bank" onclick="goToTalentBank()" type="button">
<span class="material-symbols-outlined">group</span>
<span>Banco de talentos</span>
</button>
</nav>
<div class="d-flex flex-column gap-2">
<button class="rh-modern-cta-btn" onclick="goToProcessCreate()" type="button">
<span class="material-symbols-outlined">playlist_add</span>
<span>Iniciar processo</span>
</button>
<button class="rh-modern-cta-btn" onclick="startNewTestFlow()" type="button">
<span class="material-symbols-outlined">play_circle</span>
<span>Iniciar teste</span>
</button>
</div>
</aside>
<div class="rh-modern-main">
<header class="rh-modern-topbar">
<div class="rh-modern-topbar-left">
<button aria-label="Voltar para a página principal" class="rh-modern-mobile-logo" onclick="backToMenu()" type="button">
<img alt="Logo Central 24 Horas" class="rh-modern-topbar-logo" src="style/logo-central24-crop.jpg"/>
</button>
<div class="rh-modern-search-shell">
<span class="material-symbols-outlined">search</span>
<input aria-label="Configuração da prova" placeholder="Configuração da prova" readonly="" type="text"/>
</div>
</div>
<div class="rh-modern-topbar-actions">
<button class="btn btn-primary rh-modern-primary-btn" onclick="startNewTestFlow()">Iniciar teste</button>
<button class="btn btn-outline-secondary rh-modern-secondary-btn" onclick="logout()">Sair</button>
</div>
</header>
<main class="rh-modern-page">
<section class="rh-modern-pagehead rh-modern-pagehead-history">
<div>
<p class="rh-modern-kicker">Console • Configuração</p>
<h2 class="rh-modern-title">Configuração da Prova</h2>
<p class="rh-modern-description">Selecione o perfil da vaga, o nível e a trilha da avaliação para prosseguir.</p>
</div>
</section>
<section class="rh-modern-table-card">
<div class="row g-3">
<div class="col-md-6">
<label class="form-label">Processo seletivo</label>
<select class="form-select rh-flow-input" id="candidate-process">
<option value="">Selecione...</option>
</select>
</div>
<div class="col-md-6">
<label class="form-label">Perfil da vaga</label>
<select class="form-select rh-flow-input" id="candidate-role">
<option value="">Selecione...</option>
<option>Jovem Aprendiz</option>
<option>Operador</option>
<option>Estagiário</option>
<option>Supervisor</option>
<option>Control Desk</option>
<option>Planejamento</option>
<option>TI</option>
<option>Analista</option>
<option>Outros</option>
</select>
</div>
<div class="col-md-6">
<label class="form-label">Nível da prova</label>
<select class="form-select rh-flow-input" id="candidate-level">
<option value="">Selecione...</option>
<option value="1">Nível 1 - Jovem Aprendiz</option>
<option value="2">Nível 2 - Operador / Estagiário</option>
<option value="3">Nível 3 - Supervisor / Control Desk / Planejamento</option>
<option value="4">Nível 4 - TI / Analista / Outros</option>
</select>
</div>
<div class="col-md-6">
<label class="form-label">Área / Trilha</label>
<select class="form-select rh-flow-input" id="candidate-track">
<option value="">Automático</option>
<option value="operacao">Operação</option>
<option value="ti">TI</option>
<option value="rh">RH</option>
<option value="adm">ADM / Gestão</option>
</select>
</div>
<div class="col-md-6">
<label class="form-label">Tempo total (minutos)</label>
<input class="form-control rh-flow-input" id="candidate-time" max="180" min="5" type="number" value="40"/>
</div>
</div>
<div class="rh-flow-preview mt-4">
<div class="rh-flow-preview-icon">
<span class="material-symbols-outlined">info</span>
</div>
<div>
<div class="fw-semibold mb-1">Fluxo que será aplicado</div>
<div class="text-muted small" id="flow-preview">Selecione a vaga para visualizar a trilha.</div>
</div>
</div>
<div class="alert alert-danger d-none mt-4" id="config-alert"></div>
<div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mt-4 pt-3 border-top">
<button class="btn btn-outline-secondary rh-soft-btn" onclick="backToMenu()">Voltar ao menu</button>
<button class="btn btn-success btn-lg rh-primary-cta" onclick="proceedToCandidate()">Prosseguir Teste</button>
</div>
</section>
</main>
</div>
</div>
</section>

  <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="questions.js"></script>
  <script src="Exames/excel-base-data.js"></script>
  <script src="app.js"></script>

</body>
</html>
