<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Teste Central 24 horas</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="style/styles.css" rel="stylesheet"/>
</head>
<body data-screen="screen-exam">
<section class="active screen" id="screen-exam">
<div class="rh-details-overlay d-none" id="finish-confirm-overlay" onclick="handleFinishConfirmOverlayClick(event)">
<div aria-labelledby="finish-confirm-title" aria-modal="true" class="rh-details-dialog rh-confirm-dialog" role="dialog">
<div class="rh-details-header">
<div>
<h3 class="rh-details-title" id="finish-confirm-title">Confirmar encerramento</h3>
<p class="rh-details-subtitle mb-0">Tem certeza de que deseja encerrar a prova agora?</p>
</div>
<button aria-label="Fechar confirmação" class="btn rh-details-close-btn" onclick="closeFinishConfirm()" type="button">X</button>
</div>
<div class="rh-details-body">
<div class="alert alert-warning mb-0">
              Ao confirmar, a prova será finalizada imediatamente e o candidato seguirá para a tela de conclusão.
            </div>
</div>
<div class="rh-details-footer">
<div class="rh-details-footer-actions">
<button class="btn btn-outline-secondary" onclick="closeFinishConfirm()" type="button">
                Continuar prova
              </button>
</div>
<button class="btn btn-danger" onclick="confirmFinishExam()" type="button">
              Encerrar prova
            </button>
</div>
</div>
</div>
<div class="exam-screen-shell">
<header class="exam-screen-header">
<div class="exam-screen-header-inner">
<div class="exam-screen-brand">
<img alt="Central 24 Horas" class="exam-screen-logo" src="style/logo-central24-crop.jpg"/>
<div class="exam-screen-brand-copy">
<span class="exam-screen-caption">Prova em andamento</span>
<div class="exam-screen-candidate">Candidato: <strong id="exam-candidate"></strong></div>
<span class="d-none" id="exam-role"></span>
<span class="d-none" id="exam-track"></span>
</div>
</div>
<div class="exam-screen-toolbar">
<span class="exam-stage-badge" id="stage-badge">Etapa</span>
<div class="exam-timer-shell">
<span class="material-symbols-outlined">timer</span>
<div id="timer">00:00</div>
</div>
</div>
</div>
<div class="exam-progress-track">
<div class="exam-progress-fill" id="progress-bar" style="width: 0%"></div>
</div>
</header>
<div class="exam-screen-content">
<div class="exam-question-card">
<span class="exam-question-kicker" id="progress-text">Questão 1</span>
<h3 class="exam-question-title" id="question-title"></h3>
<p class="exam-question-description" id="question-description"></p>
<div class="question-points d-none" id="question-points"></div>
</div>
<div class="exam-dynamic-area" id="dynamic-area"></div>
</div>
<footer class="exam-screen-footer">
<div class="exam-screen-footer-actions">
<button class="btn exam-nav-btn exam-nav-btn-secondary" id="prev-btn" onclick="prevQuestion()">Anterior</button>
<button class="btn exam-nav-btn exam-nav-btn-ghost" disabled="" type="button">Revisar depois</button>
</div>
<div class="exam-screen-footer-actions">
<button class="btn exam-nav-btn exam-nav-btn-danger" onclick="openFinishConfirm()" type="button">Encerrar agora</button>
<button class="btn exam-nav-btn exam-nav-btn-primary" id="next-btn" onclick="nextQuestion()">Próxima</button>
</div>
</footer>
</div>
</section>

  <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="questions.js"></script>
  <script src="Exames/excel-base-data.js"></script>
  <script src="app.js"></script>

</body>
</html>
