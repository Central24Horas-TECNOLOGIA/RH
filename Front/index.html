<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>Teste Central 24 horas</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet" />
  <link href="style/styles.css" rel="stylesheet" />
</head>

<body data-screen="screen-menu">
  <section class="active screen" id="screen-menu">
    <div class="rh-modern-shell">
      <aside class="rh-modern-sidebar">
        <div class="rh-modern-sidebar-brand">
          <button aria-label="Voltar para a página principal" class="rh-modern-logo-btn" onclick="backToMenu()" type="button">
            <img alt="Logo Central 24 Horas" class="rh-modern-logo" src="style/logo-central24-crop.jpg" />
          </button>
          <div>
            <div class="rh-modern-brand-title">Conexa</div>
            <div class="rh-modern-brand-subtitle">Central 24 horas</div>
          </div>
        </div>
        <nav class="rh-modern-nav">
          <button class="rh-modern-nav-btn" data-nav-screen="screen-menu" onclick="backToMenu()" type="button">
            <span class="material-symbols-outlined">home</span>
            <span>Página Inicial</span>
          </button>
          <button class="rh-modern-nav-btn" data-nav-screen="screen-history" onclick="goToHistory()" type="button">
            <span class="material-symbols-outlined">history</span>
            <span>Histórico</span>
          </button>
          <button class="rh-modern-nav-btn" data-nav-screen="screen-processes" onclick="goToProcesses()" type="button">
            <span class="material-symbols-outlined">folder_managed</span>
            <span>Gerenciar processos</span>
          </button>
          <button class="rh-modern-nav-btn" data-nav-screen="screen-talent-bank" onclick="goToTalentBank()" type="button">
            <span class="material-symbols-outlined">group</span>
            <span>Banco de talentos</span>
          </button>
        </nav>
        <div class="d-flex flex-column gap-2">
          <button class="rh-modern-cta-btn" onclick="goToProcessCreate()" type="button">
            <span class="material-symbols-outlined">playlist_add</span>
            <span>Iniciar processo</span>
          </button>
          <button class="rh-modern-cta-btn" onclick="startNewTestFlow()" type="button">
            <span class="material-symbols-outlined">play_circle</span>
            <span>Iniciar teste</span>
          </button>
        </div>
      </aside>
      <div class="rh-modern-main">
        <header class="rh-modern-topbar">
          <div class="rh-modern-topbar-left">
            <button aria-label="Voltar para a página principal" class="rh-modern-mobile-logo" onclick="backToMenu()" type="button">
              <img alt="Logo Central 24 Horas" class="rh-modern-topbar-logo" src="style/logo-central24-crop.jpg" />
            </button>
            <div class="rh-modern-search-shell">
              <span class="material-symbols-outlined">search</span>
              <input aria-label="Pesquisar provas salvas" placeholder="Pesquisar provas salvas" readonly="" type="text" />
            </div>
          </div>
          <div class="rh-modern-topbar-actions">
            <button class="btn btn-primary rh-modern-primary-btn" onclick="startNewTestFlow()">Iniciar teste</button>
            <button class="btn btn-outline-secondary rh-modern-secondary-btn" onclick="logout()">Sair</button>
          </div>
        </header>
        <main class="rh-modern-page">
          <section class="rh-modern-pagehead">
            <div>
              <p class="rh-modern-kicker">Página Inicial</p>
              <h3 class="rh-modern-title">Últimas Provas</h3>
              <p class="rh-modern-description">Visualize rapidamente os seis testes mais recentes salvos no sistema.</p>
              <br />
              <button class="btn btn-outline-secondary btn-sm" onclick="refreshHomeData()">Atualizar</button>
            </div>
          </section>
          <div class="d-flex justify-content-end mb-3">
          </div>
          <div class="rh-inline-alert d-none" id="menu-recent-empty">Nenhuma prova salva até o momento.</div>
          <div class="rh-recent-grid rh-modern-recent-grid" id="menu-recent-list"> </div>
          <button class="rh-modern-history-panel" onclick="goToHistory()" type="button">
            <div class="rh-modern-history-panel-icon">
              <span class="material-symbols-outlined">analytics</span>
            </div>
            <div>
              <strong>Ver histórico completo</strong>
              <span>Acesse os resultados paginados e filtre por candidato, vaga ou data.</span>
            </div>
            <span class="material-symbols-outlined">arrow_forward</span>
          </button>
          <div class="rh-details-overlay d-none" id="recent-test-details-overlay" onclick="handleRecentDetailsOverlayClick(event)">
            <div aria-labelledby="recent-test-details-title" aria-modal="true" class="rh-details-dialog" role="dialog">
              <div class="rh-details-header">
                <div>
                  <h3 class="rh-details-title" id="recent-test-details-title">Detalhes da prova</h3>
                  <p class="rh-details-subtitle mb-0">Informações completas registradas até o momento.</p>
                </div>
                <button aria-label="Fechar detalhes da prova" class="btn rh-details-close-btn" onclick="closeRecentTestDetails()" type="button">X</button>
              </div>
              <div class="rh-details-body" id="recent-test-details-body"></div>
              <div class="rh-details-footer">
                <div class="rh-details-footer-actions">
                  <!---<button type="button" class="btn btn-outline-primary" id="recent-test-download-btn" onclick="downloadRecentTestPackage()" disabled>Baixar prova</button> -->
                  <button class="btn btn-outline-secondary" id="recent-test-print-btn" onclick="printResult()" type="button">
                    Imprimir resultado
                  </button>
                </div>
                <button class="btn btn-primary" onclick="closeRecentTestDetails()" type="button">Voltar para a tela inicial</button>
              </div>
            </div>
          </div>
        </main>
      </div>
    </div>
  </section>

  <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="questions.js"></script>
  <script src="Exames/excel-base-data.js"></script>
  <script src="app.js"></script>

</body>

</html>
