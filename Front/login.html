<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Teste Central 24 horas</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="style/styles.css" rel="stylesheet"/>
</head>
<body data-screen="screen-login">
<section class="active screen" id="screen-login">
<div class="rh-login-page">
<div class="rh-login-panel rh-login-panel-modern">
<div class="rh-login-brand-block rh-login-brand-block-centered">
<img alt="Central 24 horas" class="rh-login-brand-image" src="style/Conecta_logo.png"/>
<!--<div class="rh-login-brand-subtitle">Workspace Executivo</div>-->
</div>
<div class="rh-login-copy-block">
<h2 class="rh-login-welcome-title">Bem-vindo</h2>
<p class="rh-login-welcome-text">
            Acesse sua plataforma com elegância e foco.
          </p>
</div>
<div class="mb-3">
<label class="form-label rh-login-label">Login</label>
<div class="rh-login-input-wrap">
<span class="material-symbols-outlined rh-login-input-icon">alternate_email</span>
<input class="form-control rh-login-input rh-login-input-modern" id="login-user" placeholder="nome@empresa.com.br" type="text"/>
</div>
</div>
<div class="mb-2">
<div class="rh-login-label-row">
<label class="form-label rh-login-label mb-0">Senha</label>
<button class="rh-login-link-btn" tabindex="-1" type="button">Esqueceu a senha?</button>
</div>
<div class="rh-login-input-wrap">
<span class="material-symbols-outlined rh-login-input-icon">lock</span>
<input class="form-control rh-login-input rh-login-input-modern" id="login-pass" placeholder="••••••••" type="password"/>
<span class="material-symbols-outlined rh-login-input-icon rh-login-input-icon-right">visibility</span>
</div>
</div>
<div class="rh-login-check-row">
<label class="rh-login-check-label">
<input class="rh-login-check-input" type="checkbox"/>
<span>Manter conectado</span>
</label>
</div>
<div class="alert alert-danger d-none mb-3" id="login-alert"></div>
<button class="btn rh-login-btn rh-login-btn-modern w-100" onclick="doLogin()">
<span>Acessar</span>
<span class="material-symbols-outlined">arrow_forward</span>
</button>
<div class="rh-login-footer-link">
<span>Nova na plataforma?</span>
<button class="rh-login-link-btn rh-login-link-btn-strong" tabindex="-1" type="button">Solicite ao RH</button>
</div>
<div class="rh-login-footer-meta">
<span>© 2024 Central 24 Horas</span>
<span>Privacidade</span>
<span>Termos</span>
<span>Suporte</span>
</div>
</div>
</div>
</section>

  <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="questions.js"></script>
  <script src="Exames/excel-base-data.js"></script>
  <script src="app.js"></script>

</body>
</html>
