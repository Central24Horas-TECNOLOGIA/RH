<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>Teste Central 24 horas</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet" />
  <link href="style/styles.css" rel="stylesheet" />
</head>

<body data-screen="screen-process-create">
  <section class="active screen" id="screen-process-create">
    <div class="rh-modern-shell rh-modern-shell-history">
      <aside class="rh-modern-sidebar">
        <div class="rh-modern-sidebar-brand">
          <button aria-label="Voltar para a página principal" class="rh-modern-logo-btn" onclick="backToMenu()" type="button">
            <img alt="Logo Central 24 Horas" class="rh-modern-logo" src="style/logo-central24-crop.jpg" />
          </button>
          <div>
            <div class="rh-modern-brand-title">Conexa</div>
            <div class="rh-modern-brand-subtitle">Novo processo seletivo</div>
          </div>
        </div>
        <nav class="rh-modern-nav">
          <button class="rh-modern-nav-btn" data-nav-screen="screen-menu" onclick="backToMenu()" type="button">
            <span class="material-symbols-outlined">home</span>
            <span>Página Inicial</span>
          </button>
          <button class="rh-modern-nav-btn" data-nav-screen="screen-history" onclick="goToHistory()" type="button">
            <span class="material-symbols-outlined">history</span>
            <span>Histórico</span>
          </button>
          <button class="rh-modern-nav-btn" data-nav-screen="screen-processes" onclick="goToProcesses()" type="button">
            <span class="material-symbols-outlined">folder_managed</span>
            <span>Gerenciar processos</span>
          </button>
          <button class="rh-modern-nav-btn" data-nav-screen="screen-analysis-candidates" onclick="goToCandidateAnalysis()" type="button">
            <span class="material-symbols-outlined">analytics</span>
            <span>Análise por candidato</span>
          </button>
          <button class="rh-modern-nav-btn" data-nav-screen="screen-talent-bank" onclick="goToTalentBank()" type="button">
            <span class="material-symbols-outlined">group</span>
            <span>Banco de talentos</span>
          </button>
        </nav>
        <div class="d-flex flex-column gap-2">
          <button class="rh-modern-cta-btn" onclick="goToProcessCreate()" type="button">
            <span class="material-symbols-outlined">playlist_add</span>
            <span>Iniciar processo</span>
          </button>
          <button class="rh-modern-cta-btn" onclick="startNewTestFlow()" type="button">
            <span class="material-symbols-outlined">play_circle</span>
            <span>Iniciar teste</span>
          </button>
        </div>
      </aside>
      <div class="rh-modern-main">
        <header class="rh-modern-topbar">
          <div class="rh-modern-topbar-left">
            <button aria-label="Voltar para a página principal" class="rh-modern-mobile-logo" onclick="backToMenu()" type="button">
              <img alt="Logo Central 24 Horas" class="rh-modern-topbar-logo" src="style/logo-central24-crop.jpg" />
            </button>
            <div class="rh-modern-search-shell">
              <span class="material-symbols-outlined">search</span>
              <input aria-label="Iniciar processo seletivo" placeholder="Iniciar processo seletivo" readonly="" type="text" />
            </div>
          </div>
          <div class="rh-modern-topbar-actions">
            <button class="btn btn-primary rh-modern-primary-btn" onclick="goToProcesses()">Gerenciar processos</button>
            <button class="btn btn-outline-secondary rh-modern-secondary-btn" onclick="logout()">Sair</button>
          </div>
        </header>
        <main class="rh-modern-page">
          <section class="rh-modern-pagehead rh-modern-pagehead-history">
            <div>
              <p class="rh-modern-kicker">Console • Processo seletivo</p>
              <h2 class="rh-modern-title">Iniciar Processo Seletivo</h2>
              <p class="rh-modern-description">Cadastre um novo processo seletivo sem alterar o fluxo de provas já existente.</p>
            </div>
          </section>
          <section class="rh-modern-table-card">
            <div class="row g-3">
              <div class="col-md-6">
                <label class="form-label">Vaga do processo</label>
                <select class="form-select rh-flow-input" id="process-role">
                  <option value="">Selecione...</option>
                  <option>Jovem Aprendiz</option>
                  <option>Operador</option>
                  <option>Estagiário</option>
                  <option>Supervisor</option>
                  <option>Control Desk</option>
                  <option>Planejamento</option>
                  <option>TI</option>
                  <option>Analista</option>
                  <option>Outros</option>
                </select>
              </div>
              <div class="col-md-3">
                <label class="form-label">Quantidade de vagas</label>
                <input class="form-control rh-flow-input" id="process-quantity" min="1" type="number" value="1" />
              </div>
              <div class="col-md-3">
                <label class="form-label">Data de encerramento</label>
                <input class="form-control rh-flow-input" id="process-end-date" type="date" />
              </div>
              <div class="col-md-6">
                <label class="form-label">Operação</label>
                <select class="form-select rh-flow-input" id="process-operation">
                  <option value="">Selecione...</option>
                  <option>CRF</option>
                  <option>DAVITA</option>
                  <option>NEWE</option>
                  <option>BRAVA</option>
                  <option>ENDOVIEW</option>
                </select>
              </div>
              <div class="col-md-6">
                <label class="form-label">Trilha</label>
                <select class="form-select rh-flow-input" id="process-track">
                  <option value="">Selecione...</option>
                  <option value="RH">RH</option>
                  <option value="TI">TI</option>
                </select>
              </div>
              <div class="col-md-6">
                <label class="form-label d-block mb-2">Ativar nota de corte</label>
                <label class="rh-cutoff-toggle" for="process-has-cutoff">
                  <input id="process-has-cutoff" type="checkbox" onchange="toggleProcessCutoffField()" />
                  <span class="rh-cutoff-toggle-slider"></span>
                </label>
              </div>
              <div class="col-md-6">
                <label class="form-label">Definir nota de corte</label>
                <input class="form-control rh-flow-input" disabled="" id="process-cutoff-value" max="10" min="4" placeholder="Ex.: 7" step="0.1" type="number" />
              </div>
            </div>
            <div class="alert alert-danger d-none mt-4" id="process-create-alert"></div>
            <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mt-4 pt-3 border-top">
              <button class="btn btn-outline-secondary rh-soft-btn" onclick="goToProcesses()">Voltar</button>
              <button class="btn btn-success btn-lg rh-primary-cta" onclick="createProcess()">Criar processo</button>
            </div>
          </section>
        </main>
      </div>
    </div>
    <!-- <div class="col-md-6">
        <label class="form-label d-block">Adicionar nota de corte</label>
        <div class="form-check form-switch mt-2">
          <input class="form-check-input" type="checkbox" id="process-has-cutoff" onchange="toggleProcessCutoffField()">
          <label class="form-check-label" for="process-has-cutoff">
            Ativar nota de corte
          </label>
        </div>
      </div>

      <div class="col-md-6">
        <label class="form-label">Definir nota de corte</label>
        <input id="process-cutoff-value" type="number" min="4" max="10" step="0.1" class="form-control rh-flow-input" placeholder="Ex.: 7" disabled>
      </div> -->
  </section>

  <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="questions.js"></script>
  <script src="Exames/excel-base-data.js"></script>
  <script src="app.js"></script>

</body>

</html>
