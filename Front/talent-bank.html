<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>Teste Central 24 horas</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet" />
  <link href="style/styles.css" rel="stylesheet" />
</head>

<body data-screen="screen-talent-bank">
  <section class="active screen" id="screen-talent-bank">
    <div class="rh-modern-shell rh-modern-shell-history">
      <aside class="rh-modern-sidebar">
        <div class="rh-modern-sidebar-brand">
          <button aria-label="Voltar para a página principal" class="rh-modern-logo-btn" onclick="backToMenu()" type="button">
            <img alt="Logo Central 24 Horas" class="rh-modern-logo" src="style/logo-central24-crop.jpg" />
          </button>
          <div>
            <div class="rh-modern-brand-title">Conexa</div>
            <div class="rh-modern-brand-subtitle">Banco de talentos</div>
          </div>
        </div>
        <nav class="rh-modern-nav">
          <button class="rh-modern-nav-btn" onclick="backToMenu()" type="button">
            <span class="material-symbols-outlined">home</span>
            <span>Página Inicial</span>
          </button>
          <button class="rh-modern-nav-btn" onclick="goToHistory()" type="button">
            <span class="material-symbols-outlined">history</span>
            <span>Histórico</span>
          </button>
          <button class="rh-modern-nav-btn" onclick="goToProcesses()" type="button">
            <span class="material-symbols-outlined">folder_managed</span>
            <span>Gerenciar processos</span>
          </button>
          <button class="rh-modern-nav-btn" data-nav-screen="screen-analysis-candidates" onclick="goToCandidateAnalysis()" type="button">
            <span class="material-symbols-outlined">analytics</span>
            <span>Análise por candidato</span>
          </button>
          <button class="rh-modern-nav-btn is-active" onclick="goToTalentBank()" type="button">
            <span class="material-symbols-outlined">group</span>
            <span>Banco de talentos</span>
          </button>
        </nav>
        <button class="rh-modern-cta-btn" onclick="goToProcessCreate()" type="button">
          <span class="material-symbols-outlined">playlist_add</span>
          <span>Iniciar processo</span>
        </button>
      </aside>
      <div class="rh-modern-main">
        <header class="rh-modern-topbar">
          <div class="rh-modern-topbar-left">
            <button aria-label="Voltar para a página principal" class="rh-modern-mobile-logo" onclick="backToMenu()" type="button">
              <img alt="Logo Central 24 Horas" class="rh-modern-topbar-logo" src="style/logo-central24-crop.jpg" />
            </button>
            <div class="rh-modern-search-shell">
              <span class="material-symbols-outlined">search</span>
              <input aria-label="Banco de talentos" placeholder="Banco de talentos" readonly="" type="text" />
            </div>
          </div>
          <div class="rh-modern-topbar-actions">
            <button class="btn btn-outline-secondary rh-modern-secondary-btn" onclick="logout()">Sair</button>
          </div>
        </header>
        <main class="rh-modern-page">
          <section class="rh-modern-pagehead rh-modern-pagehead-history">
            <div>
              <p class="rh-modern-kicker">Console • Reaproveitamento</p>
              <h2 class="rh-modern-title">Banco de talentos</h2>
              <p class="rh-modern-description">Consulte candidatos marcados para futuras oportunidades.</p>
            </div>
          </section>
          <section class="rh-modern-table-card">
            <div class="table-responsive">
              <table class="table align-middle history-table rh-modern-history-table">
                <thead>
                  <tr>
                    <th>Candidato</th>
                    <th>Vaga</th>
                    <th>Nível</th>
                    <th>Data</th>
                    <th>Nota</th>
                    <th>Situação atual</th>
                    <th class="text-end">Ações</th>
                  </tr>
                </thead>
                <tbody id="talent-bank-table-body">
                  <tr>
                    <td class="text-center text-muted py-4" colspan="6">Nenhum candidato no banco de talentos.</td>
                  </tr>
                </tbody>
              </table>
            </div>
          </section>
        </main>
      </div>
    </div>
  </section>

  <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="questions.js"></script>
  <script src="Exames/excel-base-data.js"></script>
  <script src="app.js"></script>

</body>

</html>
